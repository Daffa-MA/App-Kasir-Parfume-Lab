<VirtualHost *:80>
    ServerName api.perfumelabpos.com

    DocumentRoot /var/www/perfume-lab-pos/backend-laravel/public

    <Directory /var/www/perfume-lab-pos/backend-laravel/public>
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/perfume-lab-pos-error.log
    CustomLog ${APACHE_LOG_DIR}/perfume-lab-pos-access.log combined
</VirtualHost>
